<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruta Dijkstra - Perú</title>
    <!-- Incluir CSS principal -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Fuente moderna -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    
    <!-- Contenedor del Mapa (Fondo completo) -->
    <div id="map"></div>

    <!-- Panel Lateral Flotante (UI Principal) -->
    <div class="ui-panel">
        <div class="panel-header">
            <h1>Dijkstra <span>Maps</span></h1>
            <p>Calcula la ruta más corta entre departamentos del Perú usando grafos geolocalizados.</p>
        </div>

        <div class="controls-section">
            <div class="input-group">
                <label for="start-node">Punto de Partida</label>
                <div class="select-wrapper">
                    <select id="start-node">
                        <option value="">Cargando departamentos...</option>
                    </select>
                </div>
            </div>

            <div class="icon-connector">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>
            </div>

            <div class="input-group">
                <label for="end-node">Punto de Destino</label>
                <div class="select-wrapper">
                    <select id="end-node">
                        <option value="">Cargando departamentos...</option>
                    </select>
                </div>
            </div>

            <button id="calculate-btn" class="primary-btn">
                <span>Encontrar Ruta Más Corta</span>
                <span class="loader hidden" id="btn-loader"></span>
            </button>
        </div>

        <div id="results-card" class="results-card hidden">
            <h3>Resultado de Ruta</h3>
            <div class="distance-metric">
                <span class="value" id="distance-val">0</span>
                <span class="unit">Kilómetros</span>
            </div>
            
            <div id="path-steps" class="path-steps">
                <!-- Se llenará dinámicamente con JS -->
            </div>
        </div>
    </div>

    <!-- 
      REEMPLAZA ESTE SCRIPT CON TU API KEY REAL.
      Cambia TU_API_KEY_AQUI por tu Clave de API de Google Maps.
    -->
    <script src="https://maps.googleapis.com/maps/api/js?key=TU_API_KEY_AQUI&callback=initMap" async defer></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
